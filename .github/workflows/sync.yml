name: Sync to Hugging Face space
on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Inject HF Frontmatter to README
        run: |
          # Create the required Hugging Face YAML frontmatter
          echo "---" > hf_frontmatter.txt
          echo "title: LARPAn1 Core Engine" >> hf_frontmatter.txt
          echo "emoji: 🎭" >> hf_frontmatter.txt
          echo "colorFrom: gray" >> hf_frontmatter.txt
          echo "colorTo: gray" >> hf_frontmatter.txt
          echo "sdk: docker" >> hf_frontmatter.txt
          echo "pinned: false" >> hf_frontmatter.txt
          echo "app_port: 7860" >> hf_frontmatter.txt
          echo "---" >> hf_frontmatter.txt
          echo "" >> hf_frontmatter.txt
          
          # Append the original README.md content below the frontmatter
          cat README.md >> hf_frontmatter.txt
          mv hf_frontmatter.txt README.md
          
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@github.actions"
          git config --global user.name "GitHub Actions Bot"
          # Commit the modified README to the local runner state
          git commit -am "chore: inject HF frontmatter for deployment [skip ci]" || echo "No changes to commit"
          # Force push to the Hugging Face remote
          git push https://sudoboneman:${HF_TOKEN}@huggingface.co/spaces/sudoboneman/LARPAn1 main --force
